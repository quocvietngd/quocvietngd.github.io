services:
  - type: web
    name: nora-sync-quocvietngd-2026
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/webhook-server.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: TELEGRAM_WEBHOOK_HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: nora-sync-postgres
          property: connectionString
      - key: PERSISTENCE_MODE
        value: postgres-only
      - key: BACKUP_INTERVAL_MINUTES
        value: 30

databases:
  - name: nora-sync-postgres
    databaseName: nora_sync
    plan: free
