services:
  - type: web
    name: nora-sync-quocvietngd-2026
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/webhook-server.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: TELEGRAM_WEBHOOK_HOST
        value: 0.0.0.0
      # DATABASE_URL phải được set thủ công qua Render Dashboard hoặc scripts/setup-render.sh
      # Hướng dẫn: https://neon.tech (PostgreSQL miễn phí) → copy connection string → paste vào Render env vars
      - key: PERSISTENCE_MODE
        value: auto
      - key: BACKUP_INTERVAL_MINUTES
        value: 30
